name: GrokMonitor
options:
  bundleIdPrefix: com.grokmonitor
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
targets:
  GrokMonitor:
    type: application
    platform: macOS
    sources:
      - path: GrokMonitor
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grokmonitor.app
        PRODUCT_NAME: Grok Monitor
        PRODUCT_MODULE_NAME: GrokMonitor
        INFOPLIST_FILE: GrokMonitor/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: GrokMonitor/Resources/GrokMonitor.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRIVACY_MANIFEST_FILE: GrokMonitor/Resources/PrivacyInfo.xcprivacy
      configs:
        Debug:
          ENABLE_TESTABILITY: YES
    entitlements:
      path: GrokMonitor/Resources/GrokMonitor.entitlements
  GrokMonitorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GrokMonitorTests
    dependencies:
      - target: GrokMonitor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grokmonitor.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Grok Monitor.app/Contents/MacOS/Grok Monitor"
        BUNDLE_LOADER: "$(TEST_HOST)"
        ENABLE_TESTING_SEARCH_PATHS: YES
schemes:
  GrokMonitor:
    build:
      targets:
        GrokMonitor: all
        GrokMonitorTests: [test]
    test:
      targets:
        - GrokMonitorTests
    run:
      config: Debug
